<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SchemaFlow CommandDeck</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="shell">
    <div class="terminal-frame">
      <header class="terminal-chrome">
        <div class="chrome-dots">
          <span class="dot red"></span>
          <span class="dot amber"></span>
          <span class="dot green"></span>
        </div>
        <div class="chrome-title">schemaflow://commanddeck</div>
        <div class="chrome-status" id="wasm-status">Starting</div>
      </header>
      <section id="terminal-root" class="terminal-root"></section>
    </div>
  </main>

  <section id="key-gate" class="key-gate">
    <div class="key-card">
      <p class="eyebrow">SchemaFlow CommandDeck</p>
      <h1>Connect OpenAI</h1>
      <p class="copy">
        This demo is static-hosted. Your API key stays in browser storage and is used directly from the client.
      </p>
      <label class="field">
        <span>API key</span>
        <input id="api-key-input" type="password" placeholder="sk-proj-...">
      </label>
      <label class="field">
        <span>Planning context</span>
        <input id="context-input" type="text" placeholder="Office morning, two free hours, no meetings until 11">
      </label>
      <label class="remember">
        <input id="remember-key" type="checkbox">
        <span>Remember on this device</span>
      </label>
      <div class="actions">
        <button id="connect-key" class="button primary">Enter Terminal</button>
        <button id="forget-key" class="button secondary">Forget Key</button>
      </div>
      <p id="key-status" class="status-line">Waiting for API key.</p>
    </div>
  </section>

  <script src="wasm_exec.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-canvas/lib/addon-canvas.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
