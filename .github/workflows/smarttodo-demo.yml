name: smarttodo-demo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: smarttodo-demo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test root module
        run: go test ./...

      - name: Test smarttodo module
        working-directory: examples/smarttodo
        run: go test ./...

      - name: Build demo bundle
        run: bash scripts/build-smarttodo-demo.sh

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start demo server
        run: |
          python3 -m http.server 4173 --directory dist/smarttodo-demo >/tmp/smarttodo-demo-http.log 2>&1 &
          echo $! > /tmp/smarttodo-demo-http.pid

      - name: Smoke test browser TUI
        env:
          SMARTTODO_DEMO_URL: http://127.0.0.1:4173/
          SMARTTODO_SMOKE_OUTPUT: artifacts/smarttodo-demo-smoke
        run: node scripts/smarttodo-demo-smoke.mjs

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smarttodo-demo-smoke
          path: artifacts/smarttodo-demo-smoke

      - name: Stop demo server
        if: always()
        run: |
          if [ -f /tmp/smarttodo-demo-http.pid ]; then
            kill "$(cat /tmp/smarttodo-demo-http.pid)" || true
          fi

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/smarttodo-demo

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
